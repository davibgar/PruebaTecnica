services:
  postgres:
    image: postgres:16-alpine
    container_name: nodotech_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nodotech
      POSTGRES_PASSWORD: nodotech
      POSTGRES_DB: nodotech_marketing
    ports:
      # Puerto del host configurable (default 5432). Útil si ya tienes un
      # PostgreSQL local ocupando el 5432: exporta POSTGRES_HOST_PORT=5433.
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - nodotech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nodotech -d nodotech_marketing']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      target: development # imagen con watch para hot-reload
    container_name: nodotech_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy # espera a que Postgres esté listo
    environment:
      PORT: 3001
      # Dentro de la red de Docker la API llega a Postgres por el NOMBRE del
      # servicio (postgres) y su puerto interno (5432), no por localhost.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nodotech
      DB_PASSWORD: nodotech
      DB_NAME: nodotech_marketing
      CORS_ORIGIN: http://localhost:3000
      ATTRIBUTION_WINDOW_DAYS: 30
      ATTRIBUTION_HALF_LIFE_DAYS: 7
      # Fuerza polling del watcher: los montajes desde Windows no propagan
      # eventos de filesystem de forma fiable.
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      # Hot-reload: el código fuente del host se monta en el contenedor.
      # node_modules NO se monta: se usa el de la imagen (Linux).
      - ./apps/api/src:/app/src
    ports:
      - '${API_HOST_PORT:-3001}:3001'

  web:
    build:
      context: ./apps/web
      target: development # imagen con next dev para hot-reload
    container_name: nodotech_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # NEXT_PUBLIC_* corre en el NAVEGADOR (host), así que la API se alcanza por
      # localhost y el puerto publicado, no por el nombre de servicio de Docker.
      NEXT_PUBLIC_API_URL: http://localhost:${API_HOST_PORT:-3001}/api
      NEXT_PUBLIC_BUSINESS_ID: 11111111-1111-1111-1111-111111111111
      # Polling del watcher: los montajes desde Windows no propagan eventos fs.
      WATCHPACK_POLLING: 'true'
    volumes:
      # Hot-reload del código fuente; node_modules y .next quedan en la imagen.
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    ports:
      - '${WEB_HOST_PORT:-3000}:3000'

volumes:
  nodotech_pgdata:
